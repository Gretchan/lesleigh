<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You, Me & The Moon</title>
  <style>
    :root {
      --bg-1: #030716;
      --bg-2: #07103b;
      --bg-3: #0f1a57;
      --moon: #f7f2e8;
      --moon-glow: rgba(255, 244, 214, 0.3);
      --star: #fff6d8;
      --text: #f6f4ff;
      --muted: #c7c3df;
      --card: rgba(11, 17, 43, 0.8);
      --border: rgba(255, 255, 255, 0.12);
      --accent: #d9d0ff;
      --accent-2: #8fb8ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(143, 184, 255, 0.08), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(217, 208, 255, 0.06), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(70, 90, 180, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-3), var(--bg-2) 38%, var(--bg-1) 100%);
    }

    .sky {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .sky::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .parallax-layer {
      position: absolute;
      inset: 0;
      will-change: transform;
      transition: transform 0.12s linear;
    }

    .moon {
      position: absolute;
      top: 8vh;
      right: 8vw;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffdf9 0%, var(--moon) 58%, #d8d1c3 100%);
      box-shadow:
        0 0 35px var(--moon-glow),
        0 0 100px rgba(255, 244, 214, 0.14),
        0 0 180px rgba(255, 244, 214, 0.08);
      animation: floatMoon 7s ease-in-out infinite;
      z-index: 3;
      cursor: pointer;
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      box-shadow:
        -20px -10px 0 0 rgba(173, 162, 141, 0.14),
        20px 10px 0 0 rgba(173, 162, 141, 0.10),
        0 -18px 0 0 rgba(173, 162, 141, 0.08);
    }

    .title {
      position: absolute;
      left: 50%;
      top: 8vh;
      transform: translateX(-50%);
      text-align: center;
      z-index: 4;
      padding: 0 20px;
      width: min(90vw, 900px);
    }

    .title .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .title h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.3rem, 5vw, 4.5rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      text-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    .title p {
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      max-width: 700px;
      margin: 0 auto;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      color: rgba(246, 244, 255, 0.78);
      font-size: 0.95rem;
      z-index: 5;
      letter-spacing: 0.02em;
      animation: pulseText 2.8s ease-in-out infinite;
      padding: 0 18px;
      text-align: center;
    }

    .tiny-stars span {
      position: absolute;
      display: block;
      width: 2px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      animation: tinyTwinkle 3.8s ease-in-out infinite;
      z-index: 1;
    }

    .line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.2), rgba(255,255,255,0.02));
      transform-origin: left center;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      animation: drawLine 1.8s ease forwards;
    }

    .star {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, var(--star) 42%, rgba(255,246,214,0.2) 68%, transparent 72%);
      box-shadow:
        0 0 10px rgba(255, 246, 214, 0.8),
        0 0 24px rgba(255, 246, 214, 0.25);
      cursor: pointer;
      animation: twinkle 2.6s ease-in-out infinite;
      transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease;
      z-index: 4;
    }

    .star:hover,
    .star:focus-visible {
      transform: scale(1.45);
      filter: brightness(1.25);
      box-shadow:
        0 0 14px rgba(255,255,255,0.95),
        0 0 32px rgba(255,246,214,0.5);
      outline: none;
    }

    .star::before,
    .star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
    }

    .star::before {
      width: 2px;
      height: 24px;
    }

    .star::after {
      width: 24px;
      height: 2px;
    }

    .star.special {
      width: 22px;
      height: 22px;
      background: radial-gradient(circle, #fff 0%, #ece5ff 42%, rgba(143,184,255,0.28) 72%, transparent 76%);
      box-shadow:
        0 0 14px rgba(217, 208, 255, 0.95),
        0 0 32px rgba(143, 184, 255, 0.4);
    }

    .shooting-star {
      position: absolute;
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.95), rgba(255,255,255,0));
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .shooting-star.active {
      animation: shoot 1.7s linear forwards;
    }

    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #fff6d8 60%, transparent 72%);
      pointer-events: none;
      z-index: 100;
      animation: sparkleBurst 700ms ease-out forwards;
    }

    .moon-secret {
      position: absolute;
      top: 13vh;
      right: 16vw;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.45s ease, transform 0.45s ease;
      z-index: 4;
    }

    .moon-secret.show {
      opacity: 1;
      transform: scale(1);
    }

    .photo-rail {
      position: absolute;
      left: 50%;
      bottom: 74px;
      transform: translateX(-50%);
      width: min(92vw, 1080px);
      display: flex;
      gap: 14px;
      padding: 10px 6px 4px;
      overflow-x: auto;
      overflow-y: hidden;
      z-index: 5;
      scrollbar-width: none;
    }

    .photo-rail::-webkit-scrollbar {
      display: none;
    }

    .memory-card {
      flex: 0 0 150px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
      transform: translateY(0);
      transition: transform 0.25s ease, border-color 0.25s ease;
      animation: drift 6s ease-in-out infinite;
    }

    .memory-card:nth-child(2n) { animation-duration: 7.5s; }
    .memory-card:nth-child(3n) { animation-duration: 8.5s; }

    .memory-card:hover {
      transform: translateY(-8px) scale(1.03);
      border-color: rgba(255,255,255,0.18);
    }

    .memory-card img {
      display: block;
      width: 100%;
      height: 200px;
      object-fit: cover;
      filter: grayscale(1) brightness(0.78) contrast(1.06) saturate(0.65);
      transition: filter 0.35s ease, transform 0.35s ease;
    }

    .memory-card:hover img {
      filter: grayscale(0.15) brightness(0.95) contrast(1.03) saturate(0.95);
      transform: scale(1.04);
    }

    .memory-card .caption {
      padding: 10px 12px 12px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 4, 12, 0.68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .overlay.show {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    .card {
      width: min(94vw, 880px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: center;
    }

    .card-media {
      min-height: 360px;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: grayscale(0.35) brightness(0.9) contrast(1.05);
      transition: filter 0.35s ease, transform 0.35s ease;
    }

    .card-media:hover img {
      filter: grayscale(0) brightness(0.98) contrast(1.02);
      transform: scale(1.02);
    }

    .card-copy .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    .card-copy h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.6rem, 2.8vw, 2.3rem);
      font-weight: 500;
      margin-bottom: 14px;
      color: #fff;
      line-height: 1.1;
    }

    .card-copy p {
      font-size: 1.02rem;
      line-height: 1.75;
      color: #efeaff;
      white-space: pre-line;
    }

    .footer-note {
      margin-top: 18px;
      color: #bcb5d8;
      font-size: 0.92rem;
    }

    .close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.05rem;
      color: white;
      background: rgba(255,255,255,0.08);
      z-index: 3;
    }

    .close:hover {
      background: rgba(255,255,255,0.16);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.58; transform: scale(0.96); }
      50% { opacity: 1; transform: scale(1.12); }
    }

    @keyframes tinyTwinkle {
      0%, 100% { opacity: 0.22; }
      50% { opacity: 0.95; }
    }

    @keyframes floatMoon {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(8px); }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    @keyframes shoot {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(-28deg) scaleX(0.2);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(420px, 240px, 0) rotate(-28deg) scaleX(1);
      }
    }

    @keyframes sparkleBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.2);
      }
    }

    @keyframes drawLine {
      from {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
      }
      to {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }
    }

    @media (max-width: 900px) {
      .card {
        grid-template-columns: 1fr;
      }

      .card-media {
        min-height: 280px;
      }

      .photo-rail {
        bottom: 88px;
      }
    }

    @media (max-width: 700px) {
      .moon {
        width: 100px;
        height: 100px;
        right: 6vw;
        top: 6vh;
      }

      .title {
        top: 7vh;
      }

      .memory-card {
        flex-basis: 120px;
      }

      .memory-card img {
        height: 160px;
      }

      .photo-rail {
        gap: 10px;
        width: 95vw;
      }

      .hint {
        bottom: 18px;
        font-size: 0.88rem;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="sky" id="sky">
    <div class="parallax-layer" id="parallaxSlow">
      <div class="tiny-stars" id="tinyStars"></div>
    </div>

    <div class="parallax-layer" id="parallaxFast"></div>

    <div class="moon" id="moon" aria-label="Moon"></div>
    <button class="star special moon-secret" id="moonSecretStar" aria-label="Moon secret"></button>

    <div class="title">
      <div class="eyebrow">For Lesleigh</div>
      <h1>You, Me &amp; The Moon</h1>
      <p>Close your eyes for a moment… now open them and follow the stars.</p>
    </div>

    <div class="photo-rail" id="photoRail"></div>

    <div class="hint">Tap the stars. Hover the memories. Watch the sky. ✨</div>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="cardTitle">
    <div class="card">
      <button class="close" id="closeBtn" aria-label="Close">✕</button>

      <div class="card-media">
        <img id="cardImage" src="" alt="Memory photo" />
      </div>

      <div class="card-copy">
        <div class="tag" id="cardTag">A memory</div>
        <h2 id="cardTitle">Title</h2>
        <p id="cardText">Message</p>
        <div class="footer-note">Under every sky, I still choose you.</div>
      </div>
    </div>
  </div>

  <script>
    const memories = [
      {
        title: "The First Spark",
        tag: "Star One",
        text: `Hey babygirl,

Come sit with me for a moment.

If I rewind my mind back to the beginning of us, I remember something very clearly... the feeling.

Not fireworks.
Not something loud or chaotic.

Something softer.

Like when the moon rises quietly and suddenly the whole sky feels different.

That was you for me.

You didn’t crash into my world.
You gently stepped into it.

And somehow, everything started feeling warmer after that.`,
        x: 19,
        y: 42,
        delay: "0s",
        image: "images/1.jpg",
        railCaption: "The beginning of my favorite story."
      },
      {
        title: "Your Smile",
        tag: "Star Two",
        text: `Baby…

Your smile is actually unfair.

I’m serious.

Because one second I can be in my own thoughts, focused on something completely normal… and then you smile at me and suddenly nothing else feels important.

You have this way of lighting up moments without even trying.

And every time I see that smile, my brain just quietly says:

“Yeah… that’s my person.”`,
        x: 34,
        y: 64,
        delay: "0.6s",
        image: "images/2.jpg",
        railCaption: "You make light look easy."
      },
      {
        title: "Our Silly Moments",
        tag: "Star Three",
        text: `One of my favourite things about us is how easily we can go from serious to completely ridiculous.

Like… one minute we’re talking about life, dreams and the future.

And the next minute we’re laughing so hard we can barely breathe.

Those moments might look small from the outside.

But for me?

They’re some of the most beautiful parts of loving you.`,
        x: 49,
        y: 47,
        delay: "1.1s",
        image: "images/3.jpg",
        railCaption: "The kind of joy I never get tired of."
      },
      {
        title: "Being With You",
        tag: "Star Four",
        text: `You know something I’ve realized?

The place almost never matters.

It could be a restaurant.
A road trip.
A quiet couch.
Or just sitting somewhere doing absolutely nothing.

Because somehow the moment becomes special the second you’re in it.

You have this way of making ordinary time feel like something worth remembering.`,
        x: 61,
        y: 70,
        delay: "0.9s",
        image: "images/4.jpg",
        railCaption: "Us, in the middle of a beautiful day."
      },
      {
        title: "The Way I See You",
        tag: "Star Five",
        text: `Let me remind you of something you sometimes forget.

You are genuinely one of the most beautiful people I’ve ever known.

Not just your face.
Not just your smile.

Your heart.
Your mind.
Your way of loving people.
Your ability to notice things others miss.

You walk into a room quietly… but somehow everyone feels your presence.

And I feel lucky every single day that I get to love that person.`,
        x: 74,
        y: 43,
        delay: "0.3s",
        image: "images/5.jpg",
        railCaption: "Wherever you are feels right."
      },
      {
        title: "My Favorite Place",
        tag: "Star Six",
        text: `If someone asked me where my favourite place in the world is…

I could name a hundred beautiful locations.

But the truth?

My favourite place is wherever you are.

Because that’s where I feel calm.
That’s where I laugh the most.
That’s where my heart relaxes.`,
        x: 84,
        y: 81,
        delay: "1.2s",
        image: "images/6.jpg",
        railCaption: "You make adventure feel gentle."
      },
      {
        title: "A Moment I Keep",
        tag: "Star Seven",
        text: `Some moments don’t need to be big to matter.

Sometimes it’s just a look.
A hug.
A kiss.
A random laugh.

But somehow those little moments stay in my memory longer than anything else.

And every time I replay them, I realize something again:

I really, really love doing life with you.`,
        x: 67,
        y: 27,
        delay: "1.5s",
        image: "images/7.jpg",
        railCaption: "One moment. Infinite replay."
      }
    ];

    const photoMoments = [
      { image: "images/8.jpg", caption: "Sweet little ordinary moments." },
      { image: "images/9.jpg", caption: "The kind of day I’d relive." },
      { image: "images/10.jpg", caption: "You look like peace to me." }
    ];

    const moonSecret = {
      title: "The Moon Reminds Me of You",
      tag: "Hidden Star",
      text: `You know why I love the moon so much?

Because it reminds me of you.

It shows up quietly.
It doesn’t demand attention.
It just shines in its own way.

Even when it’s only a small sliver… it’s still beautiful.

And that’s the thing about you.

You don’t need to be perfect to light up my world.

You already do.

Always.`,
      image: "images/8.jpg"
    };

    const sky = document.getElementById("sky");
    const overlay = document.getElementById("overlay");
    const closeBtn = document.getElementById("closeBtn");
    const cardTitle = document.getElementById("cardTitle");
    const cardText = document.getElementById("cardText");
    const cardTag = document.getElementById("cardTag");
    const cardImage = document.getElementById("cardImage");
    const tinyStars = document.getElementById("tinyStars");
    const photoRail = document.getElementById("photoRail");
    const parallaxSlow = document.getElementById("parallaxSlow");
    const parallaxFast = document.getElementById("parallaxFast");
    const moon = document.getElementById("moon");
    const moonSecretStar = document.getElementById("moonSecretStar");

    function createTinyStars(count = 80) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement("span");
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.opacity = String(Math.random());
        star.style.animationDelay = (Math.random() * 3).toFixed(2) + "s";
        star.style.transform = `scale(${(Math.random() * 1.6 + 0.4).toFixed(2)})`;
        tinyStars.appendChild(star);
      }
    }

    function drawLine(a, b, delayIndex) {
      const line = document.createElement("div");
      line.className = "line";

      const x1 = a.x;
      const y1 = a.y;
      const x2 = b.x;
      const y2 = b.y;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      line.style.left = x1 + "%";
      line.style.top = y1 + "%";
      line.style.width = length + "%";
      line.style.transform = `rotate(${angle}deg)`;
      line.style.animationDelay = `${0.2 + delayIndex * 0.18}s`;

      parallaxFast.appendChild(line);
    }

    function openMemory(memory) {
      cardTitle.textContent = memory.title;
      cardText.textContent = memory.text;
      cardTag.textContent = memory.tag;
      cardImage.src = memory.image;
      cardImage.alt = memory.title;
      overlay.classList.add("show");
    }

    function closeMemory() {
      overlay.classList.remove("show");
    }

    function createStars() {
      memories.forEach((memory, index) => {
        const star = document.createElement("button");
        star.className = "star";
        star.style.left = memory.x + "%";
        star.style.top = memory.y + "%";
        star.style.animationDelay = memory.delay;
        star.setAttribute("aria-label", memory.title);

        star.addEventListener("click", (event) => {
          createSparkles(event.clientX, event.clientY);
          openMemory(memory);
        });

        parallaxFast.appendChild(star);

        if (index < memories.length - 1) {
          drawLine(memories[index], memories[index + 1], index);
        }
      });
    }

    function createPhotoRail() {
      const railItems = [...memories, ...photoMoments];
      railItems.forEach((item) => {
        const card = document.createElement("div");
        card.className = "memory-card";

        const img = document.createElement("img");
        img.src = item.image;
        img.alt = item.caption || item.railCaption || "Memory photo";

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.textContent = item.railCaption || item.caption || "A little memory.";

        card.appendChild(img);
        card.appendChild(caption);

        if (item.title && item.text) {
          card.style.cursor = "pointer";
          card.addEventListener("click", () => openMemory(item));
        }

        photoRail.appendChild(card);
      });
    }

    function createSparkles(x, y) {
      for (let i = 0; i < 12; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";

        const angle = Math.random() * Math.PI * 2;
        const distance = 20 + Math.random() * 32;
        const dx = Math.cos(angle) * distance + "px";
        const dy = Math.sin(angle) * distance + "px";

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";
        sparkle.style.setProperty("--dx", dx);
        sparkle.style.setProperty("--dy", dy);

        document.body.appendChild(sparkle);
        sparkle.addEventListener("animationend", () => sparkle.remove());
      }
    }

    function spawnShootingStar() {
      const star = document.createElement("div");
      star.className = "shooting-star active";
      star.style.left = Math.random() * 70 + "%";
      star.style.top = Math.random() * 28 + 8 + "%";
      sky.appendChild(star);
      star.addEventListener("animationend", () => star.remove());
    }

    function randomShootingStars() {
      spawnShootingStar();
      const next = 5000 + Math.random() * 5000;
      setTimeout(randomShootingStars, next);
    }

    function setupParallax() {
      let targetX = 0;
      let targetY = 0;
      let currentX = 0;
      let currentY = 0;

      window.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        targetX = x;
        targetY = y;
      });

      function animate() {
        currentX += (targetX - currentX) * 0.06;
        currentY += (targetY - currentY) * 0.06;

        parallaxSlow.style.transform = `translate(${currentX * -10}px, ${currentY * -10}px)`;
        parallaxFast.style.transform = `translate(${currentX * -18}px, ${currentY * -18}px)`;

        requestAnimationFrame(animate);
      }

      animate();
    }

    function setupMoonSecret() {
      let revealed = false;

      moon.addEventListener("click", () => {
        if (!revealed) {
          moonSecretStar.classList.add("show");
          revealed = true;
        } else {
          openMemory(moonSecret);
        }
      });

      moonSecretStar.addEventListener("click", (event) => {
        createSparkles(event.clientX, event.clientY);
        openMemory(moonSecret);
      });
    }

    closeBtn.addEventListener("click", closeMemory);

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeMemory();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMemory();
    });

    createTinyStars();
    createStars();
    createPhotoRail();
    setupParallax();
    setupMoonSecret();
    setTimeout(randomShootingStars, 1800);
  </script>
</body>
</html>
