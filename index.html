<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>You, Me & The Moon</title>
  <style>
    :root {
      --bg-1: #020611;
      --bg-2: #071238;
      --bg-3: #101d5d;
      --moon: #f7f2e8;
      --moon-glow: rgba(255, 244, 214, 0.28);
      --star: #fff6d8;
      --text: #f6f4ff;
      --muted: #c9c5df;
      --card: rgba(10, 16, 42, 0.84);
      --border: rgba(255, 255, 255, 0.12);
      --accent: #ddd5ff;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(143, 184, 255, 0.08), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(217, 208, 255, 0.06), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(70, 90, 180, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-3), var(--bg-2) 40%, var(--bg-1) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: relative;
    }

    .sky {
      position: relative;
      width: 100vw;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
    }

    .sky::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .parallax-layer {
      position: absolute;
      inset: 0;
      will-change: transform;
      transition: transform 0.12s linear;
    }

    .tiny-stars span {
      position: absolute;
      display: block;
      width: 2px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      animation: tinyTwinkle 3.8s ease-in-out infinite;
      z-index: 1;
    }

    .moon {
      position: absolute;
      top: 7svh;
      right: 7vw;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffdf9 0%, var(--moon) 58%, #d8d1c3 100%);
      box-shadow:
        0 0 35px var(--moon-glow),
        0 0 100px rgba(255, 244, 214, 0.14),
        0 0 180px rgba(255, 244, 214, 0.08);
      animation: floatMoon 7s ease-in-out infinite;
      z-index: 3;
      cursor: pointer;
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      box-shadow:
        -20px -10px 0 0 rgba(173, 162, 141, 0.14),
        20px 10px 0 0 rgba(173, 162, 141, 0.10),
        0 -18px 0 0 rgba(173, 162, 141, 0.08);
    }

    .title {
      position: absolute;
      left: 50%;
      top: 6svh;
      transform: translateX(-50%);
      text-align: center;
      z-index: 4;
      padding: 0 18px;
      width: min(94vw, 800px);
    }

    .title .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .title h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 8vw, 4.2rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      text-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      line-height: 1.05;
    }

    .title p {
      color: var(--muted);
      font-size: clamp(0.96rem, 3.7vw, 1.15rem);
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.45;
    }

    .line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.2), rgba(255,255,255,0.02));
      transform-origin: left center;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      animation: drawLine 1.8s ease forwards;
    }

    .star {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, var(--star) 42%, rgba(255,246,214,0.2) 68%, transparent 72%);
      box-shadow:
        0 0 10px rgba(255, 246, 214, 0.8),
        0 0 24px rgba(255, 246, 214, 0.25);
      cursor: pointer;
      animation: twinkle 2.6s ease-in-out infinite;
      transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease;
      z-index: 4;
    }

    .star:hover,
    .star:focus-visible,
    .star:active {
      transform: scale(1.35);
      filter: brightness(1.25);
      box-shadow:
        0 0 14px rgba(255,255,255,0.95),
        0 0 32px rgba(255,246,214,0.5);
      outline: none;
    }

    .star::before,
    .star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
    }

    .star::before {
      width: 2px;
      height: 28px;
    }

    .star::after {
      width: 28px;
      height: 2px;
    }

    .star.special {
      width: 26px;
      height: 26px;
      background: radial-gradient(circle, #fff 0%, #ece5ff 42%, rgba(143,184,255,0.28) 72%, transparent 76%);
      box-shadow:
        0 0 14px rgba(217, 208, 255, 0.95),
        0 0 32px rgba(143, 184, 255, 0.4);
    }

    .moon-secret {
      position: absolute;
      top: 12svh;
      right: 18vw;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.45s ease, transform 0.45s ease;
      z-index: 4;
    }

    .moon-secret.show {
      opacity: 1;
      transform: scale(1);
    }

    .shooting-star {
      position: absolute;
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.95), rgba(255,255,255,0));
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .shooting-star.active {
      animation: shoot 1.7s linear forwards;
    }

    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #fff6d8 60%, transparent 72%);
      pointer-events: none;
      z-index: 100;
      animation: sparkleBurst 700ms ease-out forwards;
    }

    .photo-rail {
      position: absolute;
      left: 50%;
      bottom: calc(20px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(96vw, 1100px);
      display: flex;
      gap: 10px;
      padding: 8px 6px 4px;
      overflow-x: auto;
      overflow-y: hidden;
      z-index: 5;
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }

    .photo-rail::-webkit-scrollbar {
      display: none;
    }

    .memory-card {
      flex: 0 0 110px;
      scroll-snap-align: start;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
      transform: translateY(0);
      transition: transform 0.25s ease, border-color 0.25s ease;
      animation: drift 6s ease-in-out infinite;
    }

    .memory-card:nth-child(2n) { animation-duration: 7.5s; }
    .memory-card:nth-child(3n) { animation-duration: 8.5s; }

    .memory-card:active,
    .memory-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(255,255,255,0.18);
    }

    .memory-card img {
      display: block;
      width: 100%;
      height: 138px;
      object-fit: cover;
      filter: grayscale(1) brightness(0.78) contrast(1.06) saturate(0.65);
      transition: filter 0.35s ease, transform 0.35s ease;
    }

    .memory-card:hover img,
    .memory-card:active img {
      filter: grayscale(0.12) brightness(0.96) contrast(1.03) saturate(0.95);
      transform: scale(1.04);
    }

    .memory-card .caption {
      padding: 9px 10px 11px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.3;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: calc(190px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: rgba(246, 244, 255, 0.8);
      font-size: 0.88rem;
      z-index: 5;
      letter-spacing: 0.02em;
      animation: pulseText 2.8s ease-in-out infinite;
      padding: 0 16px;
      text-align: center;
      width: 90vw;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 4, 12, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .overlay.show {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    .card {
      width: min(94vw, 880px);
      max-height: min(88svh, 860px);
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .card-media {
      min-height: 240px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: grayscale(0.3) brightness(0.9) contrast(1.05);
      transition: filter 0.35s ease, transform 0.35s ease;
    }

    .card-media:hover img {
      filter: grayscale(0) brightness(0.98) contrast(1.02);
      transform: scale(1.02);
    }

    .card-copy .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.03em;
    }

    .card-copy h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.45rem, 6vw, 2.2rem);
      font-weight: 500;
      margin-bottom: 12px;
      color: #fff;
      line-height: 1.08;
    }

    .card-copy p {
      font-size: 0.99rem;
      line-height: 1.75;
      color: #efeaff;
      white-space: pre-line;
    }

    .footer-note {
      margin-top: 16px;
      color: #bcb5d8;
      font-size: 0.88rem;
    }

    .close {
      position: sticky;
      top: 0;
      margin-left: auto;
      border: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.05rem;
      color: white;
      background: rgba(255,255,255,0.08);
      z-index: 3;
      display: block;
    }

    .close:hover {
      background: rgba(255,255,255,0.16);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.58; transform: scale(0.96); }
      50% { opacity: 1; transform: scale(1.12); }
    }

    @keyframes tinyTwinkle {
      0%, 100% { opacity: 0.22; }
      50% { opacity: 0.95; }
    }

    @keyframes floatMoon {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(8px); }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    @keyframes shoot {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(-28deg) scaleX(0.2);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(420px, 240px, 0) rotate(-28deg) scaleX(1);
      }
    }

    @keyframes sparkleBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.2);
      }
    }

    @keyframes drawLine {
      from {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
      }
      to {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }
    }

    @media (min-width: 760px) {
      .moon {
        width: 150px;
        height: 150px;
      }

      .star {
        width: 20px;
        height: 20px;
      }

      .star::before {
        height: 24px;
      }

      .star::after {
        width: 24px;
      }

      .photo-rail {
        gap: 14px;
      }

      .memory-card {
        flex-basis: 150px;
      }

      .memory-card img {
        height: 200px;
      }

      .hint {
        bottom: 250px;
        font-size: 0.95rem;
      }

      .card {
        grid-template-columns: 1fr 1fr;
        padding: 24px;
      }

      .card-media {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main class="sky" id="sky">
    <div class="parallax-layer" id="parallaxSlow">
      <div class="tiny-stars" id="tinyStars"></div>
    </div>

    <div class="parallax-layer" id="parallaxFast"></div>

    <div class="moon" id="moon" aria-label="Moon"></div>
    <button class="star special moon-secret" id="moonSecretStar" aria-label="Moon secret"></button>

    <div class="title">
      <div class="eyebrow">For Lesleigh</div>
      <h1>You, Me &amp; The Moon</h1>
      <p>Close your eyes for a moment… now open them and follow the stars.</p>
    </div>

    <div class="hint">Tap the stars and let me remind you how beautiful you are. ✨</div>

    <div class="photo-rail" id="photoRail"></div>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="cardTitle">
    <div class="card">
      <button class="close" id="closeBtn" aria-label="Close">✕</button>

      <div class="card-media">
        <img id="cardImage" src="" alt="Memory photo" />
      </div>

      <div class="card-copy">
        <div class="tag" id="cardTag">A little reminder</div>
        <h2 id="cardTitle">Title</h2>
        <p id="cardText">Message</p>
        <div class="footer-note">Under every sky, I still choose you.</div>
      </div>
    </div>
  </div>

the kind that feels real.

      text: `You know why I love the moon so much?

Always.`,
      image: "images/1.jpg"
    };

    const sky = document.getElementById("sky");
    const overlay = document.getElementById("overlay");
    const closeBtn = document.getElementById("closeBtn");
    const cardTitle = document.getElementById("cardTitle");
    const cardText = document.getElementById("cardText");
    const cardTag = document.getElementById("cardTag");
    const cardImage = document.getElementById("cardImage");
    const tinyStars = document.getElementById("tinyStars");
    const photoRail = document.getElementById("photoRail");
    const parallaxSlow = document.getElementById("parallaxSlow");
    const parallaxFast = document.getElementById("parallaxFast");
    const moon = document.getElementById("moon");
    const moonSecretStar = document.getElementById("moonSecretStar");

    function createTinyStars(count = 85) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement("span");
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.opacity = String(Math.random());
        star.style.animationDelay = (Math.random() * 3).toFixed(2) + "s";
        star.style.transform = `scale(${(Math.random() * 1.6 + 0.4).toFixed(2)})`;
        tinyStars.appendChild(star);
      }
    }

    function drawLine(a, b, delayIndex) {
      const line = document.createElement("div");
      line.className = "line";

      const x1 = a.x;
      const y1 = a.y;
      const x2 = b.x;
      const y2 = b.y;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      line.style.left = x1 + "%";
      line.style.top = y1 + "%";
      line.style.width = length + "%";
      line.style.transform = `rotate(${angle}deg)`;
      line.style.animationDelay = `${0.2 + delayIndex * 0.15}s`;

      parallaxFast.appendChild(line);
    }

    function openMemory(memory) {
      cardTitle.textContent = memory.title;
      cardText.textContent = memory.text;
      cardTag.textContent = memory.tag;
      cardImage.src = memory.image;
      cardImage.alt = memory.title;
      overlay.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeMemory() {
      overlay.classList.remove("show");
      document.body.style.overflow = "";
    }

    function createStars() {
      memories.forEach((memory, index) => {
        const star = document.createElement("button");
        star.className = "star";
        star.style.left = memory.x + "%";
        star.style.top = memory.y + "%";
        star.style.animationDelay = memory.delay;
        star.setAttribute("aria-label", memory.title);

        star.addEventListener("click", (event) => {
          createSparkles(event.clientX, event.clientY);
          openMemory(memory);
        });

        parallaxFast.appendChild(star);

        if (index < memories.length - 1) {
          drawLine(memories[index], memories[index + 1], index);
        }
      });
    }

    function createPhotoRail() {
      memories.forEach((item) => {
        const card = document.createElement("div");
        card.className = "memory-card";

        const img = document.createElement("img");
        img.src = item.image;
        img.alt = item.railCaption || item.title;

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.textContent = item.railCaption;

        card.appendChild(img);
        card.appendChild(caption);
        card.addEventListener("click", () => openMemory(item));

        photoRail.appendChild(card);
      });
    }

    function createSparkles(x, y) {
      for (let i = 0; i < 12; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";

        const angle = Math.random() * Math.PI * 2;
        const distance = 20 + Math.random() * 32;
        const dx = Math.cos(angle) * distance + "px";
        const dy = Math.sin(angle) * distance + "px";

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";
        sparkle.style.setProperty("--dx", dx);
        sparkle.style.setProperty("--dy", dy);

        document.body.appendChild(sparkle);
        sparkle.addEventListener("animationend", () => sparkle.remove());
      }
    }

    function spawnShootingStar() {
      const star = document.createElement("div");
      star.className = "shooting-star active";
      star.style.left = Math.random() * 70 + "%";
      star.style.top = Math.random() * 26 + 10 + "%";
      sky.appendChild(star);
      star.addEventListener("animationend", () => star.remove());
    }

    function randomShootingStars() {
      spawnShootingStar();
      const next = 5000 + Math.random() * 5000;
      setTimeout(randomShootingStars, next);
    }

    function setupParallax() {
      let targetX = 0;
      let targetY = 0;
      let currentX = 0;
      let currentY = 0;

      window.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        targetX = x;
        targetY = y;
      });

      window.addEventListener("deviceorientation", (e) => {
        const x = Math.max(-1, Math.min(1, (e.gamma || 0) / 25));
        const y = Math.max(-1, Math.min(1, (e.beta || 0) / 40));
        targetX = x;
        targetY = y * 0.6;
      });

      function animate() {
        currentX += (targetX - currentX) * 0.06;
        currentY += (targetY - currentY) * 0.06;

        parallaxSlow.style.transform = `translate(${currentX * -8}px, ${currentY * -8}px)`;
        parallaxFast.style.transform = `translate(${currentX * -14}px, ${currentY * -14}px)`;

        requestAnimationFrame(animate);
      }

      animate();
    }

    function setupMoonSecret() {
      let revealed = false;

      moon.addEventListener("click", () => {
        if (!revealed) {
          moonSecretStar.classList.add("show");
          revealed = true;
        } else {
          openMemory(moonSecret);
        }
      });

      moonSecretStar.addEventListener("click", (event) => {
        createSparkles(event.clientX, event.clientY);
        openMemory(moonSecret);
      });
    }

    closeBtn.addEventListener("click", closeMemory);

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeMemory();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMemory();
    });

    createTinyStars();
    createStars();
    createPhotoRail();
    setupParallax();
    setupMoonSecret();
    setTimeout(randomShootingStars, 1800);
  </script>
</body>
</html>
