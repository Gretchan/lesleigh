<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You, Me & The Moon</title>

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#020617;
color:white;
overflow-x:hidden;
}

.page{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
font-family:Georgia,serif;
font-size:3rem;
margin-top:10px;
}

.subtitle{
text-align:center;
color:#c9c6ff;
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.scratch-card{
background:#0b1028;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
}

.card-media{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
}

.card-image{
width:100%;
height:100%;
object-fit:cover;
filter:grayscale(100%) brightness(.85);
transition:.4s;
}

.scratch-card.revealed .card-image{
filter:none;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
touch-action:none;
}

.card-content{
padding:14px;
}

.card-title{
font-family:Georgia,serif;
font-size:1.1rem;
margin-bottom:8px;
}

.card-text{
font-size:.9rem;
line-height:1.6;
opacity:0;
transition:.4s;
}

.scratch-card.revealed .card-text{
opacity:1;
}

.card-status{
font-size:.8rem;
color:#aaa;
margin-top:8px;
}

</style>
</head>


<body>

<div class="page">

<h1>You, Me & The Moon</h1>

<p class="subtitle">
Scratch the memories and uncover why you are so beautiful to me.
</p>

<section class="cards" id="cards"></section>

</div>


<script>

const compliments = [

{
title:"Your Smile",
image:"images/1.jpg",
text:`Your smile changes the atmosphere of a room.

It doesn't arrive loudly.
It simply appears…

and suddenly everything feels lighter.`
},

{
title:"Your Beauty",
image:"images/2.jpg",
text:`Your beauty isn't loud.

It’s calm, natural and effortless.

The kind that lingers in someone's mind long after the moment ends.`
},

{
title:"Your Humour",
image:"images/3.jpg",
text:`Your humour is one of my favourite things.

Sometimes it's just a look,
sometimes your timing,
but somehow you always make joy feel easy.`
},

{
title:"Your Love",
image:"images/4.jpg",
text:`You love in such a soft and steady way.

Being loved by you feels like being handled with care.`
},

{
title:"Your Caring Heart",
image:"images/5.jpg",
text:`You notice things others miss.

You make people feel seen.

That kind of heart is rare.`
},

{
title:"Your Presence",
image:"images/6.jpg",
text:`Your presence brings peace.

When you're near, things feel calmer.

Like home.`
},

{
title:"Your Joy",
image:"images/7.jpg",
text:`Joy looks good on you.

It fits you naturally,
like it was always meant to live there.`
},

{
title:"Your Softness",
image:"images/8.jpg",
text:`Your softness is powerful.

It heals more than you realise.`
},

{
title:"Your Strength",
image:"images/9.jpg",
text:`You are strong in quiet ways.

The kind of strength people feel even when you say nothing.`
},

{
title:"You",
image:"images/10.jpg",
text:`You are lovable simply because you are you.

And honestly…

that’s my favourite thing about you.`
}

];


const cardsEl=document.getElementById("cards");
const state={completed:new Set()};



function createCard(item,index){

const card=document.createElement("article");
card.className="scratch-card";

card.innerHTML=`

<div class="card-media">

<img class="card-image" src="${item.image}" />

<canvas></canvas>

</div>

<div class="card-content">

<h3 class="card-title">${item.title}</h3>

<p class="card-text">${item.text}</p>

<div class="card-status">Scratch to reveal</div>

</div>

`;

cardsEl.appendChild(card);

buildScratch(card,index);

}



function buildScratch(card,index){

const canvas=card.querySelector("canvas");
const media=card.querySelector(".card-media");

const ctx=canvas.getContext("2d",{willReadFrequently:true});

let drawing=false;
let locked=false;

function resize(){

if(locked)return;

const rect=media.getBoundingClientRect();

canvas.width=rect.width;
canvas.height=rect.height;

ctx.fillStyle="#cfd4ff";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<120;i++){

ctx.beginPath();
ctx.arc(
Math.random()*canvas.width,
Math.random()*canvas.height,
Math.random()*2,
0,
Math.PI*2
);
ctx.fillStyle="white";
ctx.fill();

}

}

function point(e){

const rect=canvas.getBoundingClientRect();
const t=e.touches?e.touches[0]:e;

return{
x:t.clientX-rect.left,
y:t.clientY-rect.top
};

}

function scratch(x,y){

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();
ctx.arc(x,y,35,0,Math.PI*2);  // larger brush
ctx.fill();

}

function revealed(){

const pixels=ctx.getImageData(0,0,canvas.width,canvas.height).data;

let transparent=0;
let total=pixels.length/4;

for(let i=3;i<pixels.length;i+=4){

if(pixels[i]<20)transparent++;

}

return transparent/total;

}



function handle(e){

if(locked)return;

const p=point(e);

scratch(p.x,p.y);

const r=revealed();

if(r>.15){

locked=true;

card.classList.add("revealed");

canvas.style.display="none";

state.completed.add(index);

}

}



function start(e){

drawing=true;
handle(e);
e.preventDefault();

}

function move(e){

if(!drawing)return;
handle(e);
e.preventDefault();

}

function end(){drawing=false;}

canvas.addEventListener("pointerdown",start);
canvas.addEventListener("pointermove",move);
window.addEventListener("pointerup",end);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
window.addEventListener("touchend",end);

resize();

}



compliments.forEach((item,i)=>createCard(item,i));

</script>

</body>
</html>
